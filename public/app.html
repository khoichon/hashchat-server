<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@300;400;500&family=Geist:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #05080f; --glass: rgba(255,255,255,0.03); --glass-hover: rgba(255,255,255,0.055); --glass-active: rgba(255,255,255,0.07);
      --border: rgba(255,255,255,0.07); --border-hover: rgba(255,255,255,0.13);
      --text: rgba(255,255,255,0.88); --text-dim: rgba(255,255,255,0.35); --text-muted: rgba(255,255,255,0.12);
      --accent: #ffffff; --error: #ff5555; --success: #55ffaa;
      --sidebar-w: 256px; --header-h: 52px; --input-h: 52px;
    }
    html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: 'Geist', sans-serif; font-weight: 300; }
    body::before { content: ''; position: fixed; inset: 0; background: radial-gradient(ellipse 80% 50% at 20% 0%, rgba(80,100,200,0.07) 0%, transparent 60%), radial-gradient(ellipse 60% 40% at 80% 100%, rgba(60,80,180,0.05) 0%, transparent 60%); pointer-events: none; z-index: 0; }
    body::after { content: ''; position: fixed; inset: 0; background-image: linear-gradient(rgba(255,255,255,0.022) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.022) 1px, transparent 1px); background-size: 40px 40px; pointer-events: none; z-index: 0; }
    .layout { display: flex; height: 100vh; position: relative; z-index: 1; }

    /* sidebar */
    .sidebar { width: var(--sidebar-w); min-width: var(--sidebar-w); background: var(--glass); backdrop-filter: blur(24px) saturate(180%); -webkit-backdrop-filter: blur(24px) saturate(180%); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
    .sidebar-header { height: var(--header-h); padding: 0 1.1rem; display: flex; align-items: center; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .logo { font-family: 'Geist Mono', monospace; font-size: 0.75rem; letter-spacing: 0.2em; color: var(--accent); display: flex; align-items: center; gap: 0.55rem; text-transform: uppercase; }
    .logo-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 8px rgba(255,255,255,0.7); animation: pulse 2.5s ease infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; box-shadow: 0 0 8px rgba(255,255,255,0.7); } 50% { opacity: 0.25; box-shadow: none; } }
    .sidebar-section { padding: 0.85rem 0; flex-shrink: 0; }
    .sidebar-section + .sidebar-section { border-top: 1px solid var(--border); }
    .section-label { font-family: 'Geist Mono', monospace; font-size: 0.57rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-muted); padding: 0 1.1rem 0.55rem; display: flex; align-items: center; justify-content: space-between; }
    .section-add { cursor: pointer; color: var(--text-dim); font-size: 1rem; line-height: 1; transition: color 0.15s; background: none; border: none; padding: 0; }
    .section-add:hover { color: var(--accent); }
    .room-list { display: flex; flex-direction: column; gap: 1px; padding: 0 0.5rem; }
    .room-item { padding: 0.45rem 0.65rem; cursor: pointer; display: flex; align-items: center; gap: 0.5rem; font-size: 0.8rem; color: var(--text-dim); transition: background 0.15s, color 0.15s; border-radius: 6px; user-select: none; }
    .room-item:hover { background: var(--glass-hover); color: var(--text); }
    .room-item.active { background: var(--glass-active); color: var(--accent); box-shadow: inset 0 0 0 1px var(--border-hover); }
    .room-prefix { font-family: 'Geist Mono', monospace; font-size: 0.65rem; color: var(--text-muted); flex-shrink: 0; }
    .room-item.active .room-prefix { color: var(--text-dim); }
    .room-unread { margin-left: auto; font-family: 'Geist Mono', monospace; font-size: 0.55rem; background: rgba(255,255,255,0.1); color: var(--text-dim); padding: 1px 5px; border-radius: 4px; }
    .sidebar-footer { margin-top: auto; border-top: 1px solid var(--border); padding: 0.85rem 1.1rem; display: flex; align-items: center; gap: 0.65rem; flex-shrink: 0; background: rgba(255,255,255,0.015); }
    .user-avatar { width: 28px; height: 28px; border-radius: 6px; flex-shrink: 0; font-family: 'Geist Mono', monospace; font-size: 0.6rem; display: flex; align-items: center; justify-content: center; color: #050810; font-weight: 500; box-shadow: 0 2px 8px rgba(0,0,0,0.4); }
    .user-info { overflow: hidden; flex: 1; }
    .user-name { font-size: 0.78rem; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 400; }
    .user-hash-small { font-family: 'Geist Mono', monospace; font-size: 0.57rem; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer; transition: color 0.15s; }
    .user-hash-small:hover { color: var(--accent); }
    .footer-actions { display: flex; gap: 0.25rem; flex-shrink: 0; }
    .footer-btn { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 0.65rem; padding: 4px 6px; transition: color 0.15s; font-family: 'Geist Mono', monospace; }
    .footer-btn:hover { color: var(--text-dim); }
    .footer-btn.danger:hover { color: var(--error); }

    /* main */
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }
    .chat-header { height: var(--header-h); border-bottom: 1px solid var(--border); padding: 0 1.5rem; display: flex; align-items: center; gap: 0.75rem; flex-shrink: 0; background: rgba(255,255,255,0.015); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
    .back-btn { display: none; background: none; border: none; color: var(--text-dim); cursor: pointer; font-family: 'Geist Mono', monospace; font-size: 0.68rem; letter-spacing: 0.06em; padding: 0; margin-right: 0.5rem; transition: color 0.15s; flex-shrink: 0; }
    .back-btn:hover { color: var(--accent); }
    .chat-header-prefix { font-family: 'Geist Mono', monospace; font-size: 0.75rem; color: var(--text-muted); }
    .chat-header-name { font-family: 'Geist Mono', monospace; font-size: 0.82rem; color: var(--accent); letter-spacing: 0.04em; }
    .chat-header-desc { font-size: 0.72rem; color: var(--text-dim); margin-left: 0.3rem; padding-left: 0.75rem; border-left: 1px solid var(--border); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .invite-btn { margin-left: auto; background: var(--glass); border: 1px solid var(--border); border-radius: 6px; color: var(--text-dim); cursor: pointer; font-family: 'Geist Mono', monospace; font-size: 0.6rem; letter-spacing: 0.08em; padding: 0.3rem 0.7rem; transition: all 0.15s; white-space: nowrap; }
    .invite-btn:hover { color: var(--accent); border-color: var(--border-hover); background: var(--glass-hover); }

    /* messages */
    .messages { flex: 1; overflow-y: auto; padding: 1.25rem 1.5rem 0.5rem; display: flex; flex-direction: column; scroll-behavior: smooth; }
    .messages::-webkit-scrollbar { width: 3px; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .msg { display: grid; grid-template-columns: 28px 1fr; gap: 0 0.8rem; padding: 0.28rem 0.5rem; border-radius: 6px; transition: background 0.1s; animation: msgIn 0.18s ease both; }
    .msg:hover { background: rgba(255,255,255,0.025); }
    .msg:hover .msg-actions { opacity: 1; }
    @keyframes msgIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    .msg.collapsed .msg-avatar { visibility: hidden; }
    .msg.collapsed .msg-meta { display: none; }
    .msg.collapsed { padding-top: 0.04rem; }
    .msg-avatar { width: 28px; height: 28px; border-radius: 6px; font-family: 'Geist Mono', monospace; font-size: 0.57rem; display: flex; align-items: center; justify-content: center; color: #050810; font-weight: 500; flex-shrink: 0; margin-top: 2px; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
    .msg-body { min-width: 0; }
    .msg-meta { display: flex; align-items: baseline; gap: 0.4rem; margin-bottom: 0.15rem; flex-wrap: wrap; }
    .msg-name { font-size: 0.78rem; font-weight: 500; }
    .msg-hash-tag { font-family: 'Geist Mono', monospace; font-size: 0.6rem; color: var(--text-muted); font-weight: 300; }
    .msg-time { font-family: 'Geist Mono', monospace; font-size: 0.56rem; color: var(--text-muted); margin-left: 0.1rem; }
    .msg-text { font-size: 0.82rem; line-height: 1.6; color: var(--text); word-break: break-word; white-space: pre-wrap; overflow-y: auto; overflow-x: hidden; overflow-wrap: anywhere;}
    .msg-actions { opacity: 0; display: flex; gap: 0.3rem; align-items: center; margin-left: auto; transition: opacity 0.15s; grid-column: 2; justify-content: flex-end; padding-bottom: 2px; }
    .msg-action { background: var(--glass); border: 1px solid var(--border); color: var(--text-muted); cursor: pointer; font-family: 'Geist Mono', monospace; font-size: 0.55rem; letter-spacing: 0.06em; padding: 2px 7px; border-radius: 4px; transition: all 0.15s; }
    .msg-action:hover { background: var(--glass-hover); color: var(--text-dim); border-color: var(--border-hover); }
    .msg-reply { display: flex; align-items: center; gap: 0.4rem; border-left: 2px solid var(--border-hover); padding: 0.2rem 0.6rem; margin-bottom: 0.3rem; font-size: 0.7rem; color: var(--text-dim); font-family: 'Geist Mono', monospace; border-radius: 0 4px 4px 0; background: rgba(255,255,255,0.02); cursor: pointer; }
    .msg-reply:hover { background: rgba(255,255,255,0.04); }

    /* file attachment */
    .msg-file { display: inline-flex; align-items: center; gap: 0.6rem; background: var(--glass); border: 1px solid var(--border); border-radius: 8px; padding: 0.55rem 0.85rem; margin-top: 0.35rem; text-decoration: none; color: var(--text); transition: background 0.15s, border-color 0.15s; max-width: 280px; }
    .msg-file:hover { background: var(--glass-hover); border-color: var(--border-hover); }
    .msg-file-icon { font-family: 'Geist Mono', monospace; font-size: 0.65rem; color: var(--text-muted); flex-shrink: 0; }
    .msg-file-name { font-size: 0.75rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 180px; }
    .msg-file-size { font-family: 'Geist Mono', monospace; font-size: 0.57rem; color: var(--text-muted); white-space: nowrap; }
    .msg-image { max-width: 300px; max-height: 200px; border-radius: 8px; margin-top: 0.35rem; display: block; object-fit: cover; border: 1px solid var(--border); cursor: pointer; transition: border-color 0.15s; }
    .msg-image:hover { border-color: var(--border-hover); }

    .date-divider { display: flex; align-items: center; gap: 1rem; margin: 1rem 0; color: var(--text-muted); font-family: 'Geist Mono', monospace; font-size: 0.57rem; letter-spacing: 0.1em; text-transform: uppercase; }
    .date-divider::before, .date-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-muted); font-family: 'Geist Mono', monospace; font-size: 0.7rem; letter-spacing: 0.1em; gap: 0.5rem; }
    .empty-state-big { font-size: 2rem; opacity: 0.08; }
    .no-room { flex: 1; display: flex; align-items: center; justify-content: center; color: var(--text-muted); font-family: 'Geist Mono', monospace; font-size: 0.7rem; letter-spacing: 0.14em; }

    /* input */
    .input-area { padding: 0.85rem 1.5rem 1.1rem; flex-shrink: 0; }
    .input-wrap { display: flex; flex-direction: column; border: 1px solid var(--border); border-radius: 10px; background: var(--glass); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); transition: border-color 0.2s, box-shadow 0.2s; overflow: hidden; }
    .input-wrap:focus-within { border-color: var(--border-hover); box-shadow: 0 0 0 1px rgba(255,255,255,0.04), 0 4px 24px rgba(0,0,0,0.3); }
    .reply-preview { display: none; padding: 0.5rem 1rem; font-family: 'Geist Mono', monospace; font-size: 0.63rem; color: var(--text-dim); border-bottom: 1px solid var(--border); align-items: center; justify-content: space-between; gap: 0.5rem; background: rgba(255,255,255,0.02); }
    .reply-preview.visible { display: flex; }
    .reply-cancel { background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 0.72rem; padding: 0; transition: color 0.15s; }
    .reply-cancel:hover { color: var(--error); }
    .input-inner { display: flex; align-items: flex-end; }
    .attach-btn { background: none; border: none; border-right: 1px solid var(--border); color: var(--text-muted); cursor: pointer; padding: 0 0.9rem; height: var(--input-h); font-size: 1rem; transition: color 0.15s, background 0.15s; flex-shrink: 0; display: flex; align-items: center; }
    .attach-btn:hover { color: var(--text-dim); background: rgba(255,255,255,0.04); }
    #msg-input { flex: 1; background: none; border: none; outline: none; color: var(--text); font-family: 'Geist', sans-serif; font-size: 0.82rem; font-weight: 300; padding: 0.85rem 1rem; resize: none; min-height: var(--input-h); max-height: 160px; line-height: 1.55; }
    #msg-input::placeholder { color: var(--text-muted); }
    .send-btn { background: none; border: none; border-left: 1px solid var(--border); color: var(--text-dim); cursor: pointer; padding: 0 1.1rem; height: var(--input-h); font-family: 'Geist Mono', monospace; font-size: 0.6rem; letter-spacing: 0.1em; text-transform: uppercase; transition: color 0.15s, background 0.15s; flex-shrink: 0; align-self: flex-end; }
    .send-btn:hover { color: var(--accent); background: rgba(255,255,255,0.04); }
    .send-btn:disabled { opacity: 0.2; cursor: not-allowed; }

    /* upload progress */
    .upload-bar { display: none; padding: 0.4rem 1rem; font-family: 'Geist Mono', monospace; font-size: 0.58rem; color: var(--text-muted); border-bottom: 1px solid var(--border); align-items: center; gap: 0.75rem; background: rgba(255,255,255,0.02); }
    .upload-bar.visible { display: flex; }
    .upload-progress { flex: 1; height: 1px; background: var(--border); border-radius: 1px; overflow: hidden; }
    .upload-fill { height: 100%; background: var(--text-dim); width: 0%; transition: width 0.3s; }

    /* modals */
    .modal-overlay { position: fixed; inset: 0; background: rgba(5,8,15,0.75); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); z-index: 100; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.2s; padding: 20px; }
    .modal-overlay.visible { opacity: 1; pointer-events: all; }
    .modal { background: rgba(10,13,22,0.92); backdrop-filter: blur(32px) saturate(180%); -webkit-backdrop-filter: blur(32px) saturate(180%); border: 1px solid var(--border-hover); border-radius: 12px; padding: 1.5rem; width: 100%; max-width: 340px; box-shadow: 0 24px 64px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.03); transform: translateY(10px) scale(0.98); transition: transform 0.2s; }
    .modal-overlay.visible .modal { transform: translateY(0) scale(1); }
    .modal-title { font-family: 'Geist Mono', monospace; font-size: 0.68rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 1.25rem; }
    .modal-field { display: flex; flex-direction: column; gap: 0.4rem; margin-bottom: 0.85rem; }
    .modal-label { font-family: 'Geist Mono', monospace; font-size: 0.58rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-dim); }
    .modal-input { background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 7px; color: var(--text); font-family: 'Geist Mono', monospace; font-size: 0.78rem; padding: 0.65rem 0.9rem; outline: none; transition: border-color 0.15s, background 0.15s; width: 100%; }
    .modal-input:focus { border-color: var(--border-hover); background: rgba(255,255,255,0.06); }
    .modal-input::placeholder { color: var(--text-muted); }
    .modal-status { font-family: 'Geist Mono', monospace; font-size: 0.63rem; color: var(--error); min-height: 1rem; margin-top: 0.15rem; }
    .modal-actions { display: flex; gap: 0.5rem; margin-top: 1.1rem; }
    .modal-btn { flex: 1; padding: 0.65rem; border-radius: 7px; border: 1px solid var(--border); font-family: 'Geist Mono', monospace; font-size: 0.63rem; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; transition: all 0.15s; }
    .modal-btn.primary { background: rgba(255,255,255,0.92); color: var(--bg); border-color: transparent; }
    .modal-btn.primary:hover { background: #fff; }
    .modal-btn.secondary { background: none; color: var(--text-dim); }
    .modal-btn.secondary:hover { background: var(--glass-hover); color: var(--text); }

    /* right sidebar */
    .right-sidebar {
      width: 260px; min-width: 260px;
      background: var(--glass);
      backdrop-filter: blur(24px) saturate(180%);
      -webkit-backdrop-filter: blur(24px) saturate(180%);
      border-left: 1px solid var(--border);
      display: flex; flex-direction: column;
      overflow: hidden;
      /* hidden by default */
      width: 0; min-width: 0;
      border-left: none;
      transition: width 0.28s cubic-bezier(.4,0,.2,1), min-width 0.28s cubic-bezier(.4,0,.2,1);
    }
    .right-sidebar.open {
      width: 260px; min-width: 260px;
      border-left: 1px solid var(--border);
    }
    .rs-header {
      height: var(--header-h);
      padding: 0 1.1rem;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .rs-title {
      font-family: 'Geist Mono', monospace;
      font-size: 0.65rem; letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--text-dim);
    }
    .rs-close {
      background: none; border: none; color: var(--text-muted);
      cursor: pointer; font-size: 0.75rem; padding: 4px;
      transition: color 0.15s; line-height: 1;
    }
    .rs-close:hover { color: var(--text-dim); }
    .rs-body { flex: 1; overflow-y: auto; padding: 1rem; display: flex; flex-direction: column; gap: 1rem; }
    .rs-body::-webkit-scrollbar { width: 3px; }
    .rs-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .rs-section-label {
      font-family: 'Geist Mono', monospace;
      font-size: 0.57rem; letter-spacing: 0.16em; text-transform: uppercase;
      color: var(--text-muted); margin-bottom: 0.5rem;
    }
    .rs-desc {
      font-size: 0.75rem; color: var(--text-dim); line-height: 1.55;
    }
    .rs-desc-input {
      background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 6px;
      color: var(--text); font-family: 'Geist', sans-serif; font-size: 0.75rem; font-weight: 300;
      padding: 0.5rem 0.75rem; outline: none; width: 100%; resize: none;
      transition: border-color 0.15s, background 0.15s; line-height: 1.5;
    }
    .rs-desc-input:focus { border-color: var(--border-hover); background: rgba(255,255,255,0.06); }
    .rs-save-btn {
      margin-top: 0.4rem; width: 100%; padding: 0.45rem;
      background: rgba(255,255,255,0.92); color: var(--bg);
      border: none; border-radius: 5px;
      font-family: 'Geist Mono', monospace; font-size: 0.58rem;
      letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer;
      transition: background 0.15s;
    }
    .rs-save-btn:hover { background: #fff; }
    .rs-member {
      display: flex; align-items: center; gap: 0.6rem;
      padding: 0.4rem 0; position: relative;
    }
    .rs-member-avatar {
      width: 24px; height: 24px; border-radius: 5px; flex-shrink: 0;
      font-family: 'Geist Mono', monospace; font-size: 0.5rem;
      display: flex; align-items: center; justify-content: center;
      color: #050810; font-weight: 500;
    }
    .rs-member-info { flex: 1; min-width: 0; }
    .rs-member-name { font-size: 0.75rem; font-weight: 400; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .rs-member-hash { font-family: 'Geist Mono', monospace; font-size: 0.55rem; color: var(--text-muted); }
    .rs-role-badge {
      font-family: 'Geist Mono', monospace; font-size: 0.48rem;
      letter-spacing: 0.06em; padding: 2px 5px; border-radius: 3px;
      flex-shrink: 0;
    }
    .rs-role-badge.owner { background: rgba(255,215,0,0.12); color: #ffd700; }
    .rs-role-badge.admin { background: rgba(100,149,255,0.12); color: #6495ff; }
    .rs-member-actions { display: flex; gap: 0.3rem; }
    .rs-member-btn {
      background: none; border: 1px solid var(--border); border-radius: 4px;
      color: var(--text-muted); font-family: 'Geist Mono', monospace;
      font-size: 0.48rem; letter-spacing: 0.06em; text-transform: uppercase;
      padding: 2px 6px; cursor: pointer; transition: all 0.15s; white-space: nowrap;
    }
    .rs-member-btn:hover { border-color: var(--border-hover); color: var(--text-dim); }
    .rs-member-btn.danger:hover { border-color: rgba(255,85,85,0.4); color: var(--error); }
    .rs-divider { border: none; border-top: 1px solid var(--border); margin: 0; }
    .rs-action-btn {
      width: 100%; padding: 0.55rem; border-radius: 6px;
      border: 1px solid var(--border); background: none;
      font-family: 'Geist Mono', monospace; font-size: 0.6rem;
      letter-spacing: 0.08em; text-transform: uppercase;
      cursor: pointer; transition: all 0.15s; text-align: left;
    }
    .rs-action-btn.mute { color: var(--text-dim); }
    .rs-action-btn.mute:hover { background: var(--glass-hover); border-color: var(--border-hover); }
    .rs-action-btn.leave { color: var(--error); border-color: rgba(255,85,85,0.15); background: rgba(255,85,85,0.05); }
    .rs-action-btn.leave:hover { background: rgba(255,85,85,0.12); }

    /* sidebar toggle button in header */
    .sidebar-toggle-btn {
      background: var(--glass); border: 1px solid var(--border); border-radius: 6px;
      color: var(--text-dim); cursor: pointer;
      font-family: 'Geist Mono', monospace; font-size: 0.6rem;
      letter-spacing: 0.08em; padding: 0.3rem 0.7rem;
      transition: all 0.15s; white-space: nowrap;
    }
    .sidebar-toggle-btn:hover { color: var(--accent); border-color: var(--border-hover); background: var(--glass-hover); }

    /* system messages */
    .msg.system { grid-template-columns: 1fr; justify-items: center; padding: 0.4rem 0; }
    .msg.system .msg-text {
      font-family: 'Geist Mono', monospace; font-size: 0.62rem;
      color: var(--text-muted); text-align: center;
    }

    @media (max-width: 600px) {
      .right-sidebar {
        position: fixed; top: 0; right: 0; bottom: 0;
        width: 0 !important; min-width: 0 !important;
        z-index: 60;
        transition: width 0.28s cubic-bezier(.4,0,.2,1);
        border-left: none !important;
      }
      .right-sidebar.open {
        width: 280px !important; min-width: 280px !important;
        border-left: 1px solid var(--border) !important;
        box-shadow: -8px 0 32px rgba(0,0,0,0.4);
      }
    }

    /* official badge */
    .official-badge {
      font-family: 'Geist Mono', monospace;
      font-size: 0.48rem; letter-spacing: 0.08em;
      padding: 2px 6px; border-radius: 3px;
      background: rgba(77,150,255,0.12);
      color: #4D96FF;
      border: 1px solid rgba(77,150,255,0.2);
      flex-shrink: 0;
      align-self: center;
    }
    .msg-meta .official-badge { margin-left: 2px; }

    /* loading */
    #loading { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 200; font-family: 'Geist Mono', monospace; font-size: 0.7rem; color: var(--text-muted); letter-spacing: 0.16em; transition: opacity 0.4s; }
    #loading.hidden { opacity: 0; pointer-events: none; }

    /* toasts */
    #toast-container { position: fixed; bottom: 1.5rem; right: 1.5rem; display: flex; flex-direction: column; gap: 0.5rem; z-index: 300; pointer-events: none; }
    .toast { background: rgba(10,13,22,0.95); border: 1px solid var(--border-hover); border-radius: 8px; padding: 0.75rem 1rem; display: flex; align-items: flex-start; gap: 0.65rem; min-width: 240px; max-width: 320px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); animation: toastIn 0.25s ease; pointer-events: all; }
    @keyframes toastIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
    .toast-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; margin-top: 3px; }
    .toast-body { flex: 1; min-width: 0; }
    .toast-title { font-size: 0.75rem; font-weight: 500; margin-bottom: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .toast-msg { font-family: 'Geist Mono', monospace; font-size: 0.62rem; color: var(--text-dim); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* mobile */
    @media (max-width: 600px) {
      :root { --sidebar-w: 100vw; }
      .layout { position: relative; }
      .sidebar { position: fixed; inset: 0; width: 100vw; z-index: 50; transform: translateX(0); transition: transform 0.28s cubic-bezier(.4,0,.2,1); }
      .sidebar.hidden { transform: translateX(-100%); }
      .main { position: fixed; inset: 0; width: 100vw; transform: translateX(100%); transition: transform 0.28s cubic-bezier(.4,0,.2,1); }
      .main.visible { transform: translateX(0); }
      .back-btn { display: flex; }
      #toast-container { left: 1rem; right: 1rem; bottom: 5rem; }
      .toast { width: 100%; }
      .room-item { padding: 0.65rem 0.65rem; }
    }
  </style>
</head>
<body>
<div id="loading">// initializing</div>

<div class="layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo"><div class="logo-dot"></div>chat</div>
    </div>
    <div class="sidebar-section">
      <div class="section-label">rooms <button class="section-add" id="new-room-btn">+</button></div>
      <div class="room-list" id="room-list"></div>
    </div>
    <div class="sidebar-section">
      <div class="section-label">direct <button class="section-add" id="new-dm-btn">+</button></div>
      <div class="room-list" id="dm-list"></div>
    </div>
    <div class="sidebar-invites" style="padding:0.5rem 0.5rem 0;flex-shrink:0;">
      <a href="/invites.html" style="display:flex;align-items:center;gap:0.5rem;padding:0.45rem 0.65rem;border-radius:6px;font-family:'Geist Mono',monospace;font-size:0.7rem;letter-spacing:0.1em;color:var(--text-dim);text-decoration:none;transition:background 0.15s,color 0.15s;" onmouseover="this.style.background='var(--glass-hover)';this.style.color='var(--text)'" onmouseout="this.style.background='';this.style.color='var(--text-dim)'">
        <span>// invites</span>
        <span id="invite-badge" style="display:none;background:rgba(85,255,170,0.15);color:#55ffaa;font-size:0.55rem;padding:1px 6px;border-radius:4px;"></span>
      </a>
    </div>
    <div class="sidebar-footer">
      <div class="user-avatar" id="user-avatar"></div>
      <div class="user-info">
        <div class="user-name" id="user-name">—</div>
        <div class="user-hash-small" id="user-hash" title="click to copy">#—</div>
      </div>
      <div class="footer-actions">
        <button class="footer-btn" id="settings-btn" title="settings">cfg</button>
        <button class="footer-btn danger" id="signout-btn" title="sign out">out</button>
      </div>
    </div>
  </aside>

  <main class="main" id="main">
    <div class="no-room" id="no-room">// select a room</div>

    <!-- chat view (hidden until room selected) -->
    <div id="chat-view" style="display:none; flex-direction:column; height:100%; overflow:hidden;">
      <div class="chat-header" id="chat-header">
        <button class="back-btn" id="back-btn">← back</button>
        <span class="chat-header-prefix">#</span>
        <span class="chat-header-name" id="chat-header-name"></span>
        <span class="chat-header-desc" id="chat-header-desc"></span>
        <button class="invite-btn" id="invite-btn" style="display:none">+ invite</button>
        <button class="sidebar-toggle-btn" id="sidebar-toggle-btn" style="display:none">// info</button>
      </div>

      <div class="messages" id="messages"></div>

      <div class="input-area" id="input-area">
        <div class="input-wrap">
          <div class="upload-bar" id="upload-bar">
            <span id="upload-label">uploading…</span>
            <div class="upload-progress"><div class="upload-fill" id="upload-fill"></div></div>
          </div>
          <div class="reply-preview" id="reply-preview">
            <span id="reply-text"></span>
            <button class="reply-cancel" id="reply-cancel">✕</button>
          </div>
          <div class="input-inner">
            <button class="attach-btn" id="attach-btn" title="attach file">📎</button>
            <textarea id="msg-input" placeholder="// message…" rows="1"></textarea>
            <button class="send-btn" id="send-btn">send</button>
          </div>
        </div>
        <input type="file" id="file-input" style="display:none" />
      </div>
    </div>
  </main>

  <!-- Right sidebar -->
  <aside class="right-sidebar" id="right-sidebar">
    <div class="rs-header">
      <span class="rs-title">// info</span>
      <button class="rs-close" id="rs-close-btn" title="close">✕</button>
    </div>
    <div class="rs-body" id="rs-body">
      <!-- populated by JS -->
    </div>
  </aside>

</div>

<!-- Invite Modal -->
<div class="modal-overlay" id="invite-modal">
  <div class="modal">
    <div class="modal-title">// invite to room</div>
    <div class="modal-field">
      <label class="modal-label">hash</label>
      <input class="modal-input" id="invite-hash-input" placeholder="#deadbeef12" />
    </div>
    <div class="modal-status" id="invite-modal-status"></div>
    <div class="modal-actions">
      <button class="modal-btn secondary" id="invite-modal-cancel">cancel</button>
      <button class="modal-btn primary" id="invite-modal-add">add</button>
    </div>
  </div>
</div>

<!-- Create Room Modal -->
<div class="modal-overlay" id="room-modal">
  <div class="modal">
    <div class="modal-title">// new room</div>
    <div class="modal-field">
      <label class="modal-label">name</label>
      <input class="modal-input" id="room-name-input" placeholder="e.g. random" maxlength="32" />
    </div>
    <div class="modal-field">
      <label class="modal-label">description</label>
      <input class="modal-input" id="room-desc-input" placeholder="optional" maxlength="80" />
    </div>
    <div class="modal-status" id="room-modal-status"></div>
    <div class="modal-actions">
      <button class="modal-btn secondary" id="room-modal-cancel">cancel</button>
      <button class="modal-btn primary" id="room-modal-create">create</button>
    </div>
  </div>
</div>

<!-- DM Modal -->
<div class="modal-overlay" id="dm-modal">
  <div class="modal">
    <div class="modal-title">// new direct message</div>
    <div class="modal-field">
      <label class="modal-label">hash</label>
      <input class="modal-input" id="dm-hash-input" placeholder="#deadbeef12" />
    </div>
    <div class="modal-status" id="dm-modal-status"></div>
    <div class="modal-actions">
      <button class="modal-btn secondary" id="dm-modal-cancel">cancel</button>
      <button class="modal-btn primary" id="dm-modal-open">open</button>
    </div>
  </div>
</div>

<div id="toast-container"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="/config.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/notifications.js"></script>
<script src="/js/app.js"></script>
<script src="/js/invites.js"></script>
<script src="/js/tour.js"></script>
</body>
</html>
